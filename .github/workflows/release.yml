name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build portable exe
        shell: pwsh
        run: .\build.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PromptBarPortable
          path: |
            dist/PromptBarPortable.exe
            dist/PromptBar-Windows11.exe
            dist/PromptBar-Windows10.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PromptBarPortable.exe
            dist/PromptBar-Windows11.exe
            dist/PromptBar-Windows10.exe
          body: |
            Download `PromptBarPortable.exe` for automatic Windows 10/11 styling.

            Optional builds:
            - `PromptBar-Windows11.exe` forces the Windows 11 Fluent-style mode.
            - `PromptBar-Windows10.exe` forces the Windows 10 fallback mode.

            No installer is required.
          generate_release_notes: true
